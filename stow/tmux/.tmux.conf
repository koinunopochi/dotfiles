# default-shell を zsh のフルパスに解決する
# tmux サーバの env は PATH/SHELL が古い (nix-profile 非適用) ことがあるため、
# command -v / $SHELL に頼らず既知パスを順に探索する。
# source-file で再適用すれば、稼働中サーバでも新規 window/pane から zsh になる。
run-shell 'p=""; for c in "$HOME/.nix-profile/bin/zsh" /usr/local/bin/zsh /usr/bin/zsh /bin/zsh; do [ -x "$c" ] && p="$c" && break; done; [ -n "$p" ] && tmux set -g default-shell "$p" && tmux set -g default-command "$p"'

# OSC 52 でクリップボード連携（iTerm2 等対応ターミナル経由）
set -s set-clipboard on

# vi モードを有効にする
set-option -g mode-keys vi

# v で選択開始、V で行選択、C-v で矩形選択（vim ライク）
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# マウス操作を有効にする
set-option -g mouse on

# スクロールアップするとコピーモードに入る
bind-key -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"

# 最後までスクロールダウンするとコピーモードを抜ける
bind-key -n WheelDownPane select-pane -t= \; send-keys -M

# 現在のペインを pane 0（左のメイン）と入れ替えてから main-vertical 適用
bind M-h swap-pane -t 0 \; select-layout main-vertical
bind H   swap-pane -t 0 \; select-layout main-vertical
